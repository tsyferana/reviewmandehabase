name: review_app
description: ReviewApp, a mocked local services review app built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  faker: ^2.2.0
  flutter_animate: ^4.5.2
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.20.2
  responsive_framework: ^1.5.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1
  image_picker: ^1.2.2
  pdf: ^3.13.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo/
    - assets/mock/
    - .env
